<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — HabitQuest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #3b82f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 48px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
    }
    .emoji { font-size: 72px; margin-bottom: 20px; }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(90deg, #f97316, #fbbf24);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      padding: 16px 36px;
      border-radius: 50px;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .note {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">✅</div>
    <h1>Email confirmed!</h1>
    <p>Your HabitQuest account is ready. Open the app on your phone to get started.</p>
    <a class="btn" href="habitquest://">Open HabitQuest</a>
    <p class="note">If the button doesn't work, simply open the HabitQuest app on your device.</p>
  </div>
</body>
</html>
